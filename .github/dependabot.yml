version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "(deps:github-actions)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    cooldown:
      default-days: 3
      semver-patch-days: 1
    groups:
      github-actions-all:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/discord"
      - "/db"
    schedule:
      interval: "weekly"
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    commit-message:
      prefix: "(deps:pip)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    cooldown:
      default-days: 3
      semver-patch-days: 1
    groups:
      pip-all:
        applies-to: version-updates
        patterns:
          - "*"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/db"
      - "/discord"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # pyprojectのpython = "3.12.*" 制約と揃えるため、patch更新のみ許可
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    commit-message:
      prefix: "(deps:docker)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    cooldown:
      default-days: 3
      semver-patch-days: 1
    groups:
      docker-all:
        applies-to: version-updates
        patterns:
          - "*"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
