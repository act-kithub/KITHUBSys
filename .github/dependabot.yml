version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    commit-message:
      prefix: "(deps:github-actions)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    reviewers:
      - "ukwhatn"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "develop"
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "(deps:pip)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    reviewers:
      - "ukwhatn"

  - package-ecosystem: "docker"
    directory: "/db"
    schedule:
      interval: "daily"
    target-branch: "develop"
    # pyprojectのpython = "3.12.*" 制約と揃えるため、version updateはpatchのみ許可（security updateはignore対象外）
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    commit-message:
      prefix: "(deps:dockerfile-db)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    reviewers:
      - "ukwhatn"

  - package-ecosystem: "docker"
    directory: "/discord"
    schedule:
      interval: "daily"
    target-branch: "develop"
    # pyprojectのpython = "3.12.*" 制約と揃えるため、version updateはpatchのみ許可（security updateはignore対象外）
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    commit-message:
      prefix: "(deps:dockerfile-bot)"
    labels:
      - "dependencies"
      - "automated pr"
    assignees:
      - "ukwhatn"
    reviewers:
      - "ukwhatn"
